---
layout: base
---
<article class="post">

    <div class="language">
        {% assign items=site.pages | where:"ref", page.ref | sort: 'lang' %}
        {% for item in items %}
        {%- if item.lang != page.lang -%}
        <a class="language" href="{{ item.url }}" class="{{ item.lang }}">
            <img class="language" width=50 src="/assets/base/{{ item.lang }}.svg" />
        </a>
        {%- endif -%}
        {% endfor %}
    </div>

    <header class="post-header">
        <h1 class="post-title">{{ page.title | escape }}</h1>
    </header>

    <div class="post-content">
        {{ content }}
    </div>

</article>
